<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dancing Fox 🦊</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }
    .stage {
      position: relative;
      width: 300px;
      height: 300px;
    }
    .fox {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 120px;
      animation: dance 0.8s ease-in-out infinite;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
    }
    @keyframes dance {
      0%, 100% { transform: translateX(-50%) translateY(0) rotate(0deg); }
      25% { transform: translateX(-50%) translateY(-30px) rotate(-5deg); }
      50% { transform: translateX(-50%) translateY(0) rotate(0deg); }
      75% { transform: translateX(-50%) translateY(-30px) rotate(5deg); }
    }
    .floor {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 20px;
      background: radial-gradient(ellipse, rgba(255,150,100,0.4) 0%, transparent 70%);
      animation: glow 0.8s ease-in-out infinite;
    }
    @keyframes glow {
      0%, 100% { opacity: 0.5; transform: translateX(-50%) scale(1); }
      50% { opacity: 1; transform: translateX(-50%) scale(1.3); }
    }
    h1 {
      color: #ff6b35;
      margin-top: 40px;
      font-size: 2rem;
      text-shadow: 0 0 20px rgba(255,107,53,0.5);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    .particles {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .particle {
      position: absolute;
      width: 8px;
      height: 8px;
      background: #ffd700;
      border-radius: 50%;
      animation: rise 2s ease-out infinite;
      opacity: 0;
    }
    .particle:nth-child(1) { left: 20%; animation-delay: 0s; }
    .particle:nth-child(2) { left: 40%; animation-delay: 0.3s; }
    .particle:nth-child(3) { left: 60%; animation-delay: 0.6s; }
    .particle:nth-child(4) { left: 80%; animation-delay: 0.9s; }
    @keyframes rise {
      0% { bottom: 0; opacity: 0; }
      20% { opacity: 1; }
      100% { bottom: 100%; opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="particles">
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
    </div>
    <div class="floor"></div>
    <div class="fox">🦊</div>
  </div>
  <h1>let's dance!</h1>
</body>
</html>
